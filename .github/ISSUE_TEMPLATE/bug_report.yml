name: Bug report
description: Report incorrect ordering, crashes, packaging, or API behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make IdealOrder more reliable.
  - type: input
    id: version
    attributes:
      label: IdealOrder version or commit
      placeholder: 0.6.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Python and NumPy versions
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed private data and reduced the example as far as possible.
          required: true
